apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-apps
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
      imagePullSecrets:
      - name: ecr-secret